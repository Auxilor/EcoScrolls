# Scroll types group scrolls into categories and apply per-item slot limits.
# Each type limits how many *different* scrolls from that group can be inscribed on one item.
# Scrolls declare their type via the "type:" field in their own config.

types:
  - id: combat
    display-name: "&cCombat"
    limit: 3

  - id: utility
    display-name: "&bUtility"
    limit: 2